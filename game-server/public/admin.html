<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Estif Bingo 24/7 – Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0b0f1a;
            color: #eef2ff;
            padding: 24px;
        }

        /* Modern glassmorphism container */
        .admin-container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            background: rgba(18, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 16px 28px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #a5f3fc, #2dd4bf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-area p {
            font-size: 0.8rem;
            color: #7e8a9b;
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239,68,68,0.5);
            padding: 8px 20px;
            border-radius: 40px;
            color: #f87171;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
        }
        .logout-btn:hover {
            background: rgba(239,68,68,0.4);
            transform: scale(1.02);
        }

        /* Tabs – clean row */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #111827;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: #9ca3af;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .tab-btn.active {
            background: #1e293b;
            color: #2dd4bf;
            box-shadow: 0 4px 12px rgba(45,212,191,0.2);
        }
        .tab-btn:hover:not(.active) {
            background: #1f2937;
            color: #e2e8f0;
        }

        /* Tab content */
        .tab-content {
            display: none;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 28px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .tab-content.active {
            display: block;
        }

        /* Stats grid (dashboard) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #0f172a;
            border-radius: 24px;
            padding: 20px;
            transition: 0.2s;
            border: 1px solid #1e293b;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            border-color: #2dd4bf;
        }
        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7e8a9b;
        }
        .stat-value {
            font-size: 2.2rem;
            font-weight: 700;
            margin-top: 8px;
            color: #f0f9ff;
        }
        .stat-value.special {
            color: #2dd4bf;
        }

        /* Control groups */
        .control-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            margin-bottom: 24px;
            background: #0f172a;
            padding: 20px;
            border-radius: 24px;
        }
        .control-group label {
            font-weight: 500;
            color: #cbd5e1;
        }
        select, input, .admin-btn {
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .admin-btn-primary {
            background: #2dd4bf;
            color: #0f172a;
            border: none;
            font-weight: 600;
        }
        .admin-btn-danger {
            background: #ef4444;
            color: white;
        }
        .admin-btn-warning {
            background: #f59e0b;
            color: #0f172a;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        .admin-table th, .admin-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1e293b;
        }
        .admin-table th {
            color: #2dd4bf;
            font-weight: 600;
        }

        /* Players grid */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .player-card {
            background: #0f172a;
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #1e293b;
        }
        .player-card:hover {
            border-color: #2dd4bf;
            transform: translateY(-2px);
        }
        .player-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .player-balance {
            color: #2dd4bf;
            font-size: 1.2rem;
            margin-top: 8px;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #0f172a;
            border-radius: 28px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #2dd4bf;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-close {
            cursor: pointer;
            font-size: 24px;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1100;
        }
        .toast {
            background: #1e293b;
            padding: 12px 20px;
            border-radius: 40px;
            margin-top: 8px;
            color: white;
            border-left: 4px solid #2dd4bf;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 16px; }
            .stats-grid { grid-template-columns: repeat(2,1fr); }
        }
    </style>
</head>
<body>
<div class="admin-container" id="loginSection" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div style="background: #0f172a; padding: 40px; border-radius: 32px; width: 360px; text-align: center;">
        <h2 style="margin-bottom: 24px; color: #2dd4bf;">Admin Login</h2>
        <input type="email" id="adminEmail" placeholder="Email" style="width:100%; margin-bottom:16px;" value="johnsonestiph13@gmail.com">
        <input type="password" id="adminPassword" placeholder="Password" style="width:100%; margin-bottom:24px;" value="estiphBingo">
        <button id="loginBtn" class="admin-btn admin-btn-primary" style="width:100%;">Login</button>
        <div id="loginError" style="color:#f87171; margin-top:12px;"></div>
    </div>
</div>

<div id="adminPanel" style="display:none;">
    <div class="admin-container">
        <div class="admin-header">
            <div class="logo-area">
                <h1>ESTIF BINGO 24/7</h1>
                <p>Administration • Real‑time Bingo Control</p>
            </div>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="controls">🎮 Game Controls</button>
            <button class="tab-btn" data-tab="reports">📈 Reports</button>
            <button class="tab-btn" data-tab="players">👥 Players</button>
            <button class="tab-btn" data-tab="sounds">🔊 Sound Settings</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card"><div class="stat-label">Status</div><div id="statStatus" class="stat-value">-</div></div>
                <div class="stat-card"><div class="stat-label">Round</div><div id="statRound" class="stat-value">-</div></div>
                <div class="stat-card"><div class="stat-label">Timer</div><div id="statTimer" class="stat-value">-</div></div>
                <div class="stat-card"><div class="stat-label">Total Pool</div><div id="statTotalBet" class="stat-value">0 ETB</div></div>
                <div class="stat-card"><div class="stat-label">Winner Reward</div><div id="statWinnerReward" class="stat-value">0 ETB</div></div>
                <div class="stat-card"><div class="stat-label">Commission</div><div id="statCommission" class="stat-value">0 ETB</div></div>
                <div class="stat-card"><div class="stat-label">Players Online</div><div id="statPlayersCount" class="stat-value">0</div></div>
                <div class="stat-card"><div class="stat-label">Win %</div><div id="statWinPercent" class="stat-value special">80%</div></div>
            </div>
            <div class="control-group">
                <label>👥 Active Players</label>
                <div id="activePlayersContainer" style="flex:1; max-height:200px; overflow-y:auto;"></div>
            </div>
        </div>

        <!-- GAME CONTROLS -->
        <div id="controls" class="tab-content">
            <div class="control-group">
                <label>🏆 Win Percentage:</label>
                <select id="winPercentSelect">
                    <option value="70">70%</option>
                    <option value="75">75%</option>
                    <option value="76">76%</option>
                    <option value="80" selected>80%</option>
                </select>
                <button id="setWinPercentBtn" class="admin-btn admin-btn-primary">Set Win %</button>
                <button id="startGameBtn" class="admin-btn admin-btn-primary">🚀 Force Start Round</button>
                <button id="endGameBtn" class="admin-btn admin-btn-danger">⏹️ Force End Round</button>
                <button id="resetGameBtn" class="admin-btn admin-btn-warning">🔄 Reset Game (Round 1)</button>
            </div>
            <div id="actionMessage" style="margin-top:12px; color:#2dd4bf;"></div>
        </div>

        <!-- REPORTS -->
        <div id="reports" class="tab-content">
            <div class="control-group">
                <select id="reportType">
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                    <option value="range">Custom Range</option>
                    <option value="commission">Commission Breakdown</option>
                </select>
                <div id="dynamicDateInputs"></div>
                <button id="fetchReportBtn" class="admin-btn admin-btn-primary">Fetch Report</button>
                <button id="exportReportBtn" class="admin-btn admin-btn-primary">📥 Export CSV</button>
            </div>
            <div id="reportResult" class="table-wrapper"></div>
        </div>

        <!-- PLAYERS -->
        <div id="players" class="tab-content">
            <div class="control-group">
                <input type="text" id="playerSearchInput" placeholder="Search by username or phone" style="flex:1;">
                <button id="searchPlayerBtn" class="admin-btn admin-btn-primary">🔍 Search</button>
            </div>
            <div id="searchResultsContainer" class="players-grid"></div>
        </div>

        <!-- SOUND SETTINGS -->
        <div id="sounds" class="tab-content">
            <div class="control-group">
                <label>🎵 Default Sound Pack:</label>
                <select id="soundPackSelect">
                    <option value="pack1">Classic</option>
                    <option value="pack2">Electronic</option>
                    <option value="pack3">Casino</option>
                    <option value="pack4">Retro</option>
                </select>
                <button id="applySoundPackBtn" class="admin-btn admin-btn-primary">Apply to Player Page</button>
            </div>
        </div>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    // ---------- Admin logic (preserving all original features, updated UI) ----------
    let adminToken = localStorage.getItem('adminToken');
    let refreshInterval = null;
    const API_BASE = '';

    // Helper: API calls with auth
    async function apiCall(endpoint, method = 'GET', body = null) {
        const headers = {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${adminToken}`
        };
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`${API_BASE}${endpoint}`, options);
        if (res.status === 401) { logout(); throw new Error('Session expired'); }
        if (res.status === 429) throw new Error('Too many requests');
        return res.json();
    }

    function showToast(msg, isError = false) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        if (isError) toast.style.borderLeftColor = '#ef4444';
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // Dashboard stats
    async function refreshGameStats() {
        try {
            const data = await apiCall('/api/admin/stats');
            if (data.success) {
                document.getElementById('statStatus').innerText = data.status || '-';
                document.getElementById('statRound').innerText = data.round || '-';
                document.getElementById('statTimer').innerText = data.timer || '-';
                document.getElementById('statTotalBet').innerText = (data.totalBet || 0).toFixed(2) + ' ETB';
                document.getElementById('statWinnerReward').innerText = (data.winnerReward || 0).toFixed(2) + ' ETB';
                document.getElementById('statCommission').innerText = (data.adminCommission || 0).toFixed(2) + ' ETB';
                document.getElementById('statPlayersCount').innerText = data.playersCount || 0;
                document.getElementById('statWinPercent').innerText = (data.winPercentage || 80) + '%';
                const select = document.getElementById('winPercentSelect');
                if (select && data.winPercentage) select.value = data.winPercentage;
            }
        } catch(e) { console.error(e); }
    }

    // Active players
    async function loadActivePlayers() {
        try {
            const data = await apiCall('/api/admin/players');
            if (data.success && data.players) {
                const container = document.getElementById('activePlayersContainer');
                container.innerHTML = '';
                if (data.players.length === 0) container.innerHTML = '<div class="player-card">No players online</div>';
                else {
                    data.players.forEach(p => {
                        const div = document.createElement('div');
                        div.className = 'player-card';
                        div.innerHTML = `<div class="player-name">${escapeHtml(p.username)}</div><div>🎯 Cartelas: ${p.selectedCount}</div><div class="player-balance">💰 ${p.balance} ETB</div>`;
                        div.onclick = () => showPlayerDetail(p.telegramId);
                        container.appendChild(div);
                    });
                }
            }
        } catch(e) { console.error(e); }
    }

    // Player detail modal (balance adjustment)
    async function showPlayerDetail(telegramId) {
        try {
            const data = await apiCall(`/api/admin/player/${telegramId}`);
            if (data.success && data.player) {
                const p = data.player;
                const modalHtml = `
                    <div class="modal-overlay" id="playerModal">
                        <div class="modal">
                            <div class="modal-header">
                                <h3>${escapeHtml(p.username)}</h3>
                                <span class="modal-close" onclick="closeModal()">&times;</span>
                            </div>
                            <div>ID: ${p.telegram_id}</div>
                            <div>Phone: ${p.phone || 'N/A'}</div>
                            <div style="font-size:1.8rem; margin:16px 0;" id="modalBalance">${parseFloat(p.balance).toFixed(2)} ETB</div>
                            <div style="display:flex; gap:8px;">
                                <button onclick="adjustBalance(${p.telegram_id}, 10)" class="admin-btn admin-btn-primary">+10 ETB</button>
                                <button onclick="adjustBalance(${p.telegram_id}, 50)" class="admin-btn admin-btn-primary">+50 ETB</button>
                                <button onclick="adjustBalance(${p.telegram_id}, 100)" class="admin-btn admin-btn-primary">+100 ETB</button>
                                <button onclick="adjustBalance(${p.telegram_id}, -10)" class="admin-btn admin-btn-danger">-10 ETB</button>
                            </div>
                            <div style="margin-top:16px;"><button onclick="closeModal()" class="admin-btn">Close</button></div>
                        </div>
                    </div>
                `;
                document.body.insertAdjacentHTML('beforeend', modalHtml);
            }
        } catch(e) { showToast('Failed to load player', true); }
    }

    window.adjustBalance = async function(telegramId, amount) {
        if (!confirm(`Adjust balance by ${amount} ETB?`)) return;
        try {
            const res = await apiCall('/api/admin/adjust-balance', 'POST', { telegram_id: telegramId, amount });
            if (res.success) {
                showToast(`Balance adjusted. New: ${res.new_balance} ETB`);
                closeModal();
                refreshGameStats();
            } else showToast(res.message || 'Failed', true);
        } catch(e) { showToast('Error adjusting balance', true); }
    };

    window.closeModal = function() {
        const modal = document.getElementById('playerModal');
        if (modal) modal.remove();
    };

    // Search players
    async function searchPlayers() {
        const term = document.getElementById('playerSearchInput').value.trim();
        if (term.length < 2) { showToast('Enter at least 2 characters', true); return; }
        try {
            const data = await apiCall('/api/admin/search-players', 'POST', { search: term });
            if (data.success && data.players) {
                const container = document.getElementById('searchResultsContainer');
                container.innerHTML = '';
                data.players.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.innerHTML = `<div class="player-name">${escapeHtml(p.username)}</div><div>📱 ${p.phone || 'No phone'}</div><div class="player-balance">💰 ${parseFloat(p.balance).toFixed(2)} ETB</div>`;
                    card.onclick = () => showPlayerDetail(p.telegram_id);
                    container.appendChild(card);
                });
            }
        } catch(e) { showToast('Search failed', true); }
    }

    // Reports
    function updateDateInputs() {
        const type = document.getElementById('reportType').value;
        const container = document.getElementById('dynamicDateInputs');
        container.innerHTML = '';
        const today = new Date().toISOString().slice(0,10);
        if (type === 'daily') container.innerHTML = `<input type="date" id="reportDate" value="${today}">`;
        else if (type === 'weekly') container.innerHTML = `<input type="number" id="weekYear" placeholder="Year" value="2026" style="width:100px"> <input type="number" id="weekNum" placeholder="Week" value="1" style="width:80px">`;
        else if (type === 'monthly') container.innerHTML = `<input type="number" id="monthYear" placeholder="Year" value="2026" style="width:100px"> <select id="monthNum">${[...Array(12)].map((_,i)=>`<option value="${i+1}">${new Date(0,i).toLocaleString('default',{month:'long'})}</option>`).join('')}</select>`;
        else if (type === 'range') container.innerHTML = `<input type="date" id="startDate" value="${new Date(Date.now()-7*86400000).toISOString().slice(0,10)}"> <input type="date" id="endDate" value="${today}">`;
    }

    async function fetchReport() {
        const type = document.getElementById('reportType').value;
        let url = '';
        if (type === 'daily') url = `/api/reports/daily?date=${document.getElementById('reportDate').value}`;
        else if (type === 'weekly') url = `/api/reports/weekly?year=${document.getElementById('weekYear').value}&week=${document.getElementById('weekNum').value}`;
        else if (type === 'monthly') url = `/api/reports/monthly?year=${document.getElementById('monthYear').value}&month=${document.getElementById('monthNum').value}`;
        else if (type === 'range') url = `/api/reports/range?startDate=${document.getElementById('startDate').value}&endDate=${document.getElementById('endDate').value}`;
        else if (type === 'commission') url = `/api/reports/commission`;
        try {
            const data = await apiCall(url);
            if (data.success) {
                const container = document.getElementById('reportResult');
                if (type === 'commission') {
                    let html = '<table class="admin-table"><thead><tr><th>Round</th><th>Date</th><th>Pool</th><th>Reward</th><th>Commission</th></tr></thead><tbody>';
                    data.commissionByRound.forEach(r => html += `<tr><td>${r.round_id}</td><td>${new Date(r.timestamp).toLocaleString()}</td><td>${r.total_pool}</td><td>${r.winner_reward}</td><td>${r.admin_commission}</td></tr>`);
                    html += '</tbody></table>';
                    container.innerHTML = html;
                } else {
                    const report = data.report;
                    let html = `<div class="stats-grid" style="margin-bottom:20px;"><div class="stat-card"><div class="stat-label">Total Games</div><div class="stat-value">${report.totalGames}</div></div><div class="stat-card"><div class="stat-label">Total Bet</div><div class="stat-value">${report.totalBet} ETB</div></div><div class="stat-card"><div class="stat-label">Total Won</div><div class="stat-value">${report.totalWon} ETB</div></div><div class="stat-card"><div class="stat-label">Commission</div><div class="stat-value">${report.totalCommission} ETB</div></div></div>`;
                    if (report.rounds && report.rounds.length) {
                        html += '<table class="admin-table"><thead><tr><th>Round #</th><th>Pool</th><th>Payout</th><th>Commission</th><th>Winners</th><th>Time</th></tr></thead><tbody>';
                        report.rounds.forEach(r => html += `<tr><td>${r.round_number}</td><td>${r.total_pool}</td><td>${r.winner_reward}</td><td>${r.admin_commission}</td><td>${r.winners?.length || 0}</td><td>${new Date(r.timestamp).toLocaleString()}</td></tr>`);
                        html += '</tbody></table>';
                    }
                    container.innerHTML = html;
                }
            }
        } catch(e) { showToast('Report failed', true); }
    }

    async function exportReport() {
        const type = document.getElementById('reportType').value;
        if (type !== 'daily' && type !== 'range') { showToast('Export only for Daily/Custom Range', true); return; }
        let url = '';
        if (type === 'daily') url = `/api/reports/export/daily?date=${document.getElementById('reportDate').value}`;
        else url = `/api/reports/export/range?startDate=${document.getElementById('startDate').value}&endDate=${document.getElementById('endDate').value}`;
        try {
            const res = await fetch(`${API_BASE}${url}`, { headers: { 'Authorization': `Bearer ${adminToken}` } });
            const blob = await res.blob();
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `bingo_report.csv`; a.click(); URL.revokeObjectURL(a.href);
            showToast('Export started');
        } catch(e) { showToast('Export failed', true); }
    }

    // Game controls
    async function setWinPercentage() {
        const percentage = parseInt(document.getElementById('winPercentSelect').value);
        try {
            const res = await apiCall('/api/admin/win-percentage', 'POST', { percentage });
            if (res.success) { showToast(`Win % set to ${percentage}%`); refreshGameStats(); }
            else showToast(res.message || 'Failed', true);
        } catch(e) { showToast('Error', true); }
    }
    async function forceStart() { try { const res = await apiCall('/api/admin/start-game', 'POST'); showToast(res.message || 'Started'); refreshGameStats(); } catch(e){ showToast('Failed',true); } }
    async function forceEnd() { try { const res = await apiCall('/api/admin/end-game', 'POST'); showToast('Round ended'); refreshGameStats(); } catch(e){ showToast('Failed',true); } }
    async function resetGame() { if(confirm('Reset to round 1?')) try{ await apiCall('/api/admin/reset-game', 'POST'); showToast('Game reset'); refreshGameStats(); } catch(e){ showToast('Failed',true); } }

    // Sound settings
    function applySoundPack() { localStorage.setItem('soundPack', document.getElementById('soundPackSelect').value); showToast('Sound pack applied for players'); }

    // Login / Logout
    async function login() {
        const email = document.getElementById('adminEmail').value;
        const password = document.getElementById('adminPassword').value;
        try {
            const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
            const data = await res.json();
            if (data.success && data.token) {
                adminToken = data.token; localStorage.setItem('adminToken', adminToken);
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                refreshGameStats(); loadActivePlayers();
                if (refreshInterval) clearInterval(refreshInterval);
                refreshInterval = setInterval(() => { refreshGameStats(); loadActivePlayers(); }, 5000);
            } else { document.getElementById('loginError').innerText = 'Invalid credentials'; }
        } catch(e) { document.getElementById('loginError').innerText = 'Login failed'; }
    }
    function logout() { localStorage.removeItem('adminToken'); adminToken = null; clearInterval(refreshInterval); location.reload(); }

    // Tab switching
    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (tabId === 'players') loadActivePlayers();
                if (tabId === 'reports') updateDateInputs();
            });
        });
    }

    // Helper
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

    // Event listeners
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('setWinPercentBtn').addEventListener('click', setWinPercentage);
    document.getElementById('startGameBtn').addEventListener('click', forceStart);
    document.getElementById('endGameBtn').addEventListener('click', forceEnd);
    document.getElementById('resetGameBtn').addEventListener('click', resetGame);
    document.getElementById('fetchReportBtn').addEventListener('click', fetchReport);
    document.getElementById('exportReportBtn').addEventListener('click', exportReport);
    document.getElementById('searchPlayerBtn').addEventListener('click', searchPlayers);
    document.getElementById('applySoundPackBtn').addEventListener('click', applySoundPack);
    document.getElementById('reportType').addEventListener('change', updateDateInputs);
    updateDateInputs();
    initTabs();

    // Auto-login if token exists
    if (adminToken) {
        fetch('/api/admin/stats', { headers: { 'Authorization': `Bearer ${adminToken}` } }).then(res => {
            if (res.status === 401) logout();
            else {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                refreshGameStats(); loadActivePlayers();
                refreshInterval = setInterval(() => { refreshGameStats(); loadActivePlayers(); }, 5000);
            }
        }).catch(() => logout());
    }
</script>
</body>
</html>
